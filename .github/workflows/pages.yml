name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - paper-pdf-updated
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout site repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage site contents
        shell: pwsh
        run: |
          $stagePath = Join-Path $PWD "_site"

          if (Test-Path -LiteralPath $stagePath) {
            Remove-Item -LiteralPath $stagePath -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagePath | Out-Null

          Get-ChildItem -Force | Where-Object {
            $_.Name -notin @(".git", ".github", "_site")
          } | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $stagePath -Recurse -Force
          }

      - name: Sync PDFs from paper repositories
        shell: pwsh
        env:
          PAPER_REPO_TOKEN: ${{ secrets.PAPER_REPO_TOKEN }}
        run: |
          ./scripts/sync-pdfs.ps1 -ManifestPath ./pdf-sources.json -OutputRoot ./_site

      - name: Install PDF rasterization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Generate architecture carousel assets
        shell: pwsh
        run: |
          ./scripts/build-architecture-carousel.ps1 `
            -PdfPath ./_site/The_Spacekime_Architecture.pdf `
            -OutputImageDir ./_site/assets/img/architecture `
            -ManifestPath ./_site/assets/data/architecture-pages.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
